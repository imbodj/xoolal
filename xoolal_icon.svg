<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Triangle de base -->
  <!-- Les 3 segments colorés autour du triangle central -->

  <!-- Segment VERT (gauche) -->
  <polygon points="100,10 10,180 55,180 100,95" fill="#00853F"/>

  <!-- Segment JAUNE (droite) -->
  <polygon points="100,10 100,95 145,180 190,180" fill="#FDEF42"/>

  <!-- Segment ROUGE (bas milieu) -->
  <polygon points="55,180 100,95 145,180" fill="#E31B23"/>

  <!-- Contours fins entre segments -->
  <line x1="100" y1="10" x2="55" y2="180" stroke="white" stroke-width="2"/>
  <line x1="100" y1="10" x2="145" y2="180" stroke="white" stroke-width="2"/>
  <line x1="55" y1="180" x2="145" y2="180" stroke="white" stroke-width="2"/>

  <!-- Cercle central noir avec étoile -->
  <circle cx="100" cy="115" r="28" fill="#1a1a1a"/>

  <!-- Étoile noire (en blanc pour contraste) -->
  <polygon points="
    100,90
    106,108
    125,108
    110,119
    116,137
    100,126
    84,137
    90,119
    75,108
    94,108
  " fill="white"/>

</svg>
